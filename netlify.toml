# ── BUILD ────────────────────────────────────────────────────────────
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── BUILD PROCESSING ─────────────────────────────────────────────────
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = true       # free Netlify minification

[build.processing.js]
  bundle = false
  minify = true       # free Netlify minification

[build.processing.html]
  pretty_urls = true
  minify = true       # strips whitespace/comments — inline CSS+JS minified too

[build.processing.images]
  compress = false    # images are pre-optimized WebP/AVIF — re-encoding degrades quality

# ══════════════════════════════════════════════════════════════════════
# HEADERS — all pages
# NOTE: Redirects are handled by _redirects file (takes precedence over
#       [[redirects]] blocks in netlify.toml — no duplication here)
# ══════════════════════════════════════════════════════════════════════

# Global security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=()"
    X-XSS-Protection           = "1; mode=block"

# HTML pages — no cache (always fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets — long cache (content-hashed by Netlify)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts — very long cache (rarely change)
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Manifest + service worker — short cache
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Sitemap + robots — short cache for crawlers
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type  = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Images — long cache, immutable (files are content-hashed by script/output naming)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    # Let Netlify serve correct content types for AVIF/WebP

# Showcase SEO images — long cache, immutable
[[headers]]
  for = "/nailsbythuy-showcase-seo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# AVIF images — explicit MIME type (Netlify CDN edge nodes may not auto-detect)
[[headers]]
  for = "/*.avif"
  [headers.values]
    Content-Type  = "image/avif"
    Cache-Control = "public, max-age=31536000, immutable"

